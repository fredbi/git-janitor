roots: []
theme: default
github:
  enabled: true
  securityAlerts: true
defaults:
  rootConfig:
    scheduleInterval: 5m
  rules:
    checks:
      # Branch hygiene
      - name: branch-merged-not-deleted
      - name: branch-gone-upstream
      - name: branch-lagging
      - name: branch-no-upstream
      - name: branch-diverged
      - name: branch-not-mergeable
      - name: branch-empty
      - name: branch-unique-size
      # Worktree
      - name: dirty-worktree
      # Health & maintenance
      - name: health-gc-advised
      - name: size-repack-advised
      - name: size-unreachable-bloat
      - name: health-fsck-errors
      # Activity
      - name: activity-stale
      # Config audit
      - name: config-no-email
      - name: config-unsigned
      # Tags
      - name: tags-local-only
      - name: tags-remote-only
      # File stats
      - name: filestats-large-files
      - name: filestats-binary
      # Staleness
      - name: git-inactive-dirty
      - name: git-stale-dirty
      - name: git-stale-stash
      - name: git-inactive-nondefault
      - name: remote-branch-merged-not-deleted
      - name: remote-credentials-in-url
      - name: remote-branch-diverged
      - name: fork-upstream-default-behind-local
      - name: fork-upstream-default-behind-origin
      # Traits
      - name: traits-shallow
      - name: traits-submodules
      - name: traits-lfs
      - name: stale-submodule-dirs
      - name: git-worktree-prunable
      - name: git-worktree-stale-locked
      - name: git-worktree-dirty
      - name: git-worktree-dirty-inactive
      # GitHub (API-based, require GITHUB_TOKEN or GH_TOKEN)
      - name: github-repo-archived
      - name: github-default-branch-mismatch
      - name: github-description-missing
      - name: github-visibility-private
      - name: github-repo-fork-parent
      - name: github-security-alerts
      - name: github-branch-protection-missing
      - name: github-delete-branch-on-merge
      - name: github-fork-actions-enabled
      # Expensive / opt-in (uncomment or enable per-root):
      # - name: github-issues-unresponded
      # - name: github-prs-pending-review
    actions:
      # Branch actions
      - name: delete-branch
        auto: false
      - name: update-branch
        auto: true
      - name: rebase-branch
        auto: false
      - name: push-branch
        auto: false
      - name: push-local-to-upstream
        auto: false
      - name: push-origin-to-upstream
        auto: false
      # Maintenance
      - name: run-gc
        auto: true
      - name: run-gc-aggressive
        auto: false
      - name: run-gc-deep-clean
        auto: false
      - name: clean-stale-submodule-dirs
        auto: false
      # Worktrees
      - name: delete-worktree
        auto: false
      - name: repair-worktree
        auto: false
      - name: prune-worktrees
        auto: false
      - name: unlock-worktree
        auto: false
      - name: lock-worktree
        auto: false
      - name: add-worktree
        auto: false
      - name: move-worktree
        auto: false
      - name: stash-worktree-dirty
        auto: false
      # Tags
      - name: push-tag
        auto: false
      - name: fetch-tags
        auto: true
      - name: delete-local-tag
        auto: false
      # Staleness actions
      - name: git-stash-dirty
        auto: false
      - name: git-commit-dirty
        auto: false
      - name: git-commit-stash
        auto: false
      - name: git-switch-default-branch
        auto: false
      - name: rename-branch
        auto: false
      - name: delete-remote-branch
        auto: false
      - name: drop-stash
        auto: false
      - name: strip-remote-credentials
        auto: false
      - name: rebase-remote-branch
        auto: false
      # Clone management
      - name: delete-local-clone
        auto: false
      # GitHub actions
      - name: set-repo-description
        auto: false
      - name: enable-branch-protection
        auto: false
      - name: enable-delete-branch-on-merge
        auto: false
      - name: disable-fork-actions
        auto: false
      - name: self-assign-issue
        auto: false
      - name: close-issue
        auto: false
      # Browser
      - name: open-in-browser
        auto: true
quick-actions:
  - subject: repo
    name: open-in-terminal
    description: Open repo in a terminal
    init-commands:
      - git status
    command:
      - gnome-terminal
      - '--'
      - bash
      - '--init-file'
      - '{{init-file}}'
  - subject: branch
    name: open-branch-in-terminal
    description: Checkout branch in a terminal
    init-commands:
      - 'git checkout {{branch}}'
    command:
      - gnome-terminal
      - '--'
      - bash
      - '--init-file'
      - '{{init-file}}'
  - subject: branch
    name: open-branch-worktree-in-terminal
    description: Open branch in a new worktree
    pre-commands:
      - 'git worktree add "{{worktree}}" "{{branch}}" 2>/dev/null || true'
    init-commands:
      - git status
    command:
      - gnome-terminal
      - '--'
      - bash
      - '--init-file'
      - '{{init-file}}'
  - subject: worktree
    name: open-worktree-in-terminal
    description: Open worktree in a terminal
    init-commands:
      - git status
    command:
      - gnome-terminal
      - '--'
      - bash
      - '--init-file'
      - '{{init-file}}'
